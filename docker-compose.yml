services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis: 
    image: redis:7-alpine
    ports:
      - "6379:6379"
  
  web:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/finance_tracker
      REDIS_URL: redis://redis:6379/0 
      SECRET_KEY: dev-secret-key 
      ENVIRONMENT: development 
      SENTRY_DSN: ""
    volumes:
      - ./backend:/app 
    depends_on:
      - db
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    
  worker: 
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/finance_tracker
      REDIS_URL: redis://redis:6379/0 
      SECRET_KEY: dev-secret-key 
      ENVIRONMENT: development 
      SENTRY_DSN: ""
    volumes:
      - ./backend:/app 
    depends_on:
      - db
      - redis
    command: celery -A celery_app worker --loglevel=info --concurrency=1
  
  beat: 
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/finance_tracker
      REDIS_URL: redis://redis:6379/0 
      SECRET_KEY: dev-secret-key 
      ENVIRONMENT: development 
      SENTRY_DSN: ""
    volumes:
      - ./backend:/app 
    depends_on:
      - db
      - redis
    command: celery -A celery_app beat --loglevel=info --concurrency=1
  
volumes:
  postgres_data: 